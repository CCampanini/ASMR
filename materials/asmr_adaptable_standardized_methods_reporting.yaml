        close_mappings: [ ]
        related_mappings: [ ]
        narrow_mappings: [ ]
        broad_mappings: [ ]
      institutionID:
        description: An identifier for the institution having custody of the object(s)
          or information referred to in the record. This identifier should point to
          a persistent, resolvable identifier, such as a Research Organization Registry
          (ROR) ID or ISNI (International Standard Name Identifier).
        annotations:
          annotations:
            value:
          source:
            value: DwC
        slot_uri: http://rs.tdwg.org/dwc/terms/institutionID
        examples:
          - value: https://ror.org/042r9xb17
        range: string
        exact_mappings:
          - http://rs.tdwg.org/dwc/terms/institutionID
        close_mappings: [ ]
        related_mappings: [ ]
        narrow_mappings: [ ]
        broad_mappings: [ ]
      projectTitle:
