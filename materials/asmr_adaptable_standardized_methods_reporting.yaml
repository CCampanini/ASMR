id: https://w3id.org/asmr

name: asmr_adaptable_standardized_methods_reporting

title: ASMR – Adaptable Standardized Methods Reporting

prefixes:
  linkml: https://w3id.org/linkml/
  asmr: https://w3id.org/asmr/
  dwc: http://rs.tdwg.org/dwc/terms/
  eco: http://rs.tdwg.org/eco/terms/
  dcterms: http://purl.org/dc/terms/
  MIxS: https://w3id.org/mixs/

default_prefix: asmr

imports:
  - linkml:types

classes:
  Project:
    attributes:
      recordedBy:
        description: A list (concatenated and separated) of names of people responsible
          for the submitted dataset (e.g. eDNA) or dwc:Occurrence
        annotations:
          annotations:
            value:
          source:
            value: DwC
        slot_uri: https://dwc.tdwg.org/list/#dwc_recordedBy
        examples:
          - value: José E. Crespo
        range: string
        required: true
        exact_mappings:
          - https://dwc.tdwg.org/list/#dwc_recordedBy
        close_mappings: [ ]
        related_mappings: [ ]
        narrow_mappings: [ ]
        broad_mappings: [ ]
      recordedByID:
        description: A list (concatenated and separated) of the globally unique identifier
          for the people responsible for the submitted dataset or dwc:Occurrence
        annotations:
          annotations:
            value:
          source:
            value: DwC
        slot_uri: https://dwc.tdwg.org/list/#dwc_recordedByID
        examples:
          - value: https://orcid.org/0000-0002-1825-0097
          - value: https://orcid.org/0000-0002-1825-0098
