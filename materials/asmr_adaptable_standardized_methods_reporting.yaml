  Location:
    attributes:
      decimalLongitude:
        description: The geographic longitude in decimal degrees using WGS84 datum.
          Positive values are east of the Greenwich Meridian, negative values are
          west of it. Legal values lie between -180 and 180, inclusive. The desired
          minimum number of decimal places is the hundred-thousandth (0.00001) to
          achieve meter scale resolution.
        annotations:
          source:
            value: DwC
        slot_uri: http://rs.tdwg.org/dwc/terms/decimalLongitude
        examples:
          - value: '-121.17611'
        range: decimal
        required: true
        exact_mappings:
          - http://rs.tdwg.org/dwc/terms/decimalLongitude
        close_mappings: [ ]
        related_mappings: [ ]
        narrow_mappings: [ ]
        broad_mappings: [ ]
      decimalLatitude:
        description: The geographic latitude in decimal degrees using WGS84 datum.
          Positive values are north of the Equator, negative values are south of it.
          Legal values lie between -90 and 90, inclusive. The desired minimum number
          of decimal places is the hundred-thousandth (0.00001) to achieve meter scale
          resolution.
        annotations:
          source:
            value: DwC
        slot_uri: http://rs.tdwg.org/dwc/terms/decimalLatitude
        examples:
          - value: '-41.09834'
        range: decimal
        required: true
        exact_mappings:
          - http://rs.tdwg.org/dwc/terms/decimalLatitude
        close_mappings: [ ]
        related_mappings: [ ]
        narrow_mappings: [ ]
        broad_mappings: [ ]
      verbatimLongitude:
        description: The original longitude in any format (i.e. deg/min/sec, UTM)
          before converting to decimal degrees and WGS84. verbatimCoordinateSystem
          and verbatimGeodeticDatum should be stored as well.
        annotations:
          source:
            value: DwC
        slot_uri: http://rs.tdwg.org/dwc/terms/verbatimLongitude
